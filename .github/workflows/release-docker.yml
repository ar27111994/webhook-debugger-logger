name: Publish Docker Image

"on":
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: release-docker-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Image Tags
        id: image_tags
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          release_tag="${RELEASE_TAG}"
          version="${release_tag#v}"
          minor="$(echo "${version}" | cut -d. -f1,2)"
          image_name="webhook-debugger-logger"

          {
            echo "tags<<EOF"
            echo "ghcr.io/${owner}/${image_name}:${release_tag}"
            echo "ghcr.io/${owner}/${image_name}:${version}"
            echo "ghcr.io/${owner}/${image_name}:${minor}"
            if [[ "${RELEASE_PRERELEASE}" != "true" ]]; then
              echo "ghcr.io/${owner}/${image_name}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish Standalone Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true