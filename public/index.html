<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webhook Debugger - {{VERSION}}</title>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div class="container">
      <h1>{{BRAND_HEADER}}</h1>
      <span class="version">{{VERSION}} "Enterprise Suite"</span>
      <div>
        <div class="status">
          <div class="dot"></div>
          System Online
        </div>
        <div class="status-badge {{SIGNATURE_BADGE_CLASS}}">
          {{SIGNATURE_BADGE_LABEL}}
        </div>
      </div>
      <div class="stat-item">
        <span class="stat-label">Active Webhooks (Live TTL)</span
        ><span class="stat-value">{{ACTIVE_COUNT}} active endpoints</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Quick Start</span
        ><span class="stat-value"
          >GET <a href="/info">/info</a> to view routing and management
          APIs</span
        >
      </div>
      <p class="footer-note">
        Built for high-stakes launches •
        <a
          href="https://apify.com/ar27111994/webhook-debugger-logger"
          target="_blank"
          rel="noopener noreferrer"
          >Documentation</a
        >
      </p>
    </div>
  </body>
</html>
